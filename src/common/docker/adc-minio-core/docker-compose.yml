services:
  minio:
    image: minio/minio:latest
    container_name: adc-minio-core
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-adcadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adcpassword}
    volumes:
      - adc_minio_core_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adc-network

  minio-init:
    image: minio/mc:latest
    container_name: adc-minio-core-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-adcadmin} $${MINIO_ROOT_PASSWORD:-adcpassword};
        mc mb -p local/adc-pm || true;
        mc mb -p local/adc-articles || true;
        exit 0;
      "
    networks:
      - adc-network
    restart: "no"

volumes:
  adc_minio_core_data:

networks:
  adc-network:
    driver: bridge
