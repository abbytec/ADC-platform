<!doctype html>
<html lang="es" crystal-theme>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My Account</title>
		<script>
			(function () {
				const saved = localStorage.getItem("theme_mode");

				const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

				const isDark = saved === "dark" || (!saved && prefersDark);

				if (isDark) {
					document.documentElement.setAttribute("dark-mode", "");
				} else {
					document.documentElement.removeAttribute("dark-mode");
				}

				// aseguramos theme base
				if (!document.documentElement.hasAttribute("crystal-theme") && !document.documentElement.hasAttribute("coffee-theme")) {
					document.documentElement.setAttribute("coffee-theme", "");
				}
			})();
		</script>
		<style>
			:root {
				--custom-tone-1: 200;
				--custom-tone-2: 220;
			}

			body {
				margin: 0;
				font-family: system-ui, sans-serif;
			}
		</style>
		<style>
			body {
				margin: 0;
				font-family: system-ui, sans-serif;
			}
		</style>
	</head>

	<body>
		<div id="root"></div>
	</body>
</html>
